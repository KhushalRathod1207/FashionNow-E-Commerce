<div class='flex items-center justify-between py-5 font-medium'>
  <a routerLink="/">
    <img [src]="assets.logo" alt="Logo" class='w-36' />
  </a>
  
  <ul class='hidden sm:flex gap-5 text-sm text-gray-700'>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-1">
      <p>HOME</p>
      <hr class='w-2/4 border-none h-[1.5px] bg-gray-700 hidden' />
    </a>
    <a routerLink="/collection" routerLinkActive="active" class="flex flex-col items-center gap-1">
      <p>COLLECTION</p>
      <hr class='w-2/4 border-none h-[1.5px] bg-gray-700 hidden' />
    </a>
    <a routerLink="/about" routerLinkActive="active" class="flex flex-col items-center gap-1">
      <p>ABOUT</p>
      <hr class='w-2/4 border-none h-[1.5px] bg-gray-700 hidden' />
    </a>
    <a routerLink="/contact" routerLinkActive="active" class="flex flex-col items-center gap-1">
      <p>CONTACT</p>
      <hr class='w-2/4 border-none h-[1.5px] bg-gray-700 hidden' />
    </a>
  </ul>

  <div class='flex items-center gap-6'>
    <img (click)="shopService.showSearch.set(true)" [src]="assets.search_icon" alt="Search" class='w-5 cursor-pointer' />

    <a href="http://localhost:4201" target="_blank" class='hidden sm:block'>
      <button class='bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded-full text-xs font-semibold hover:from-blue-700 hover:to-purple-700 transition-all'>
        Admin
      </button>
    </a>

    <div class='group relative'>
      <img (click)="shopService.token() ? null : shopService.router.navigate(['/login'])" [src]="assets.profile_icon" alt="Profile" class='w-5 cursor-pointer' />
      @if (shopService.token()) {
        <div class='group-hover:block hidden absolute dropdown-menu right-0 pt-4 z-10'>
          <div class='flex flex-col gap-2 w-36 py-3 px-5 bg-slate-100 text-gray-500 rounded'>
            <p class='font-semibold text-black border-b pb-2'>{{ shopService.userName() || 'User' }}</p>
            <p (click)="shopService.router.navigate(['/profile'])" class='cursor-pointer hover:text-black'>My Profile</p>
            <p (click)="shopService.router.navigate(['/orders'])" class='cursor-pointer hover:text-black'>Orders</p>
            <p class='cursor-pointer hover:text-black' (click)="shopService.logout()">Logout</p>
          </div>
        </div>
      }
    </div>

    <a routerLink="/cart" class='relative'>
      <img [src]="assets.cart_icon" alt="Cart" class='w-5 min-w-5' />
      <p class='absolute right-[-5px] bottom-[-5px] w-4 text-center leading-4 bg-black text-white aspect-square rounded-full text-[8px]'>
        {{ shopService.cartCount() }}
      </p>
    </a>

    <img (click)="toggleMenu()" [src]="assets.menu_icon" alt="Menu" class='w-5 cursor-pointer sm:hidden' />
  </div>

  <!-- Sidebar Menu -->
  <div [class]="'absolute top-0 right-0 bottom-0 overflow-hidden bg-white transition-all ' + (visible() ? 'w-full' : 'w-0')">
    <div class='flex flex-col text-gray-600'>
      <div (click)="closeMenu()" class='flex items-center gap-4 p-3 cursor-pointer'>
        <img [src]="assets.dropdown_icon" alt="dropdown_icon" class='h-4 rotate-180' />
        <p>Back</p>
      </div>
      <a class="py-2 pl-6 border" routerLink="/" (click)="closeMenu()">HOME</a>
      <a class="py-2 pl-6 border" routerLink="/collection" (click)="closeMenu()">COLLECTION</a>
      <a class="py-2 pl-6 border" routerLink="/about" (click)="closeMenu()">ABOUT</a>
      <a class="py-2 pl-6 border" routerLink="/contact" (click)="closeMenu()">CONTACT</a>
    </div>
  </div>
</div>
