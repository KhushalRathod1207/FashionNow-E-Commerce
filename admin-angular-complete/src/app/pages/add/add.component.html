<form (ngSubmit)="onSubmit($event)" class='flex flex-col w-full items-start gap-3'>
  <div>
    <p class='mb-2 font-medium'>Upload Image</p>
    <div class='flex gap-2'>
      <label for="image1" class="cursor-pointer">
        <img class='w-20 border-2 border-gray-300 rounded' [src]="getImageUrl(image1())" alt="upload" />
        <input (change)="onFileChange($event, 1)" type="file" id='image1' hidden accept="image/*" />
      </label>
      <label for="image2" class="cursor-pointer">
        <img class='w-20 border-2 border-gray-300 rounded' [src]="getImageUrl(image2())" alt="upload" />
        <input (change)="onFileChange($event, 2)" type="file" id='image2' hidden accept="image/*" />
      </label>
      <label for="image3" class="cursor-pointer">
        <img class='w-20 border-2 border-gray-300 rounded' [src]="getImageUrl(image3())" alt="upload" />
        <input (change)="onFileChange($event, 3)" type="file" id='image3' hidden accept="image/*" />
      </label>
      <label for="image4" class="cursor-pointer">
        <img class='w-20 border-2 border-gray-300 rounded' [src]="getImageUrl(image4())" alt="upload" />
        <input (change)="onFileChange($event, 4)" type="file" id='image4' hidden accept="image/*" />
      </label>
    </div>
  </div>

  <div class='w-full'>
    <p class='mb-2 font-medium'>Product Name</p>
    <input [(ngModel)]="name" name="name" class='w-full max-w-[500px] px-3 py-2 border border-gray-300 rounded' type="text" placeholder='Type Here' required/>
  </div>

  <div class='w-full'>
    <p class='mb-2 font-medium'>Product Description</p>
    <textarea [(ngModel)]="description" name="description" class='w-full max-w-[500px] px-3 py-2 border border-gray-300 rounded' rows="4" placeholder='Write Content Here' required></textarea>
  </div>

  <div class='flex flex-col sm:flex-row gap-2 w-full sm:gap-8'>
    <div>
      <p class='mb-2 font-medium'>Product Category</p>
      <select [(ngModel)]="category" name="category" class='w-full px-3 py-2 border border-gray-300 rounded'>
        <option value="Men">Men</option>
        <option value="Women">Women</option>
        <option value="Kids">Kids</option>
      </select>
    </div>

    <div>
      <p class='mb-2 font-medium'>Sub Category</p>
      <select [(ngModel)]="subCategory" name="subCategory" class='w-full px-3 py-2 border border-gray-300 rounded'>
        <option value="Topwear">Topwear</option>
        <option value="Bottomwear">Bottomwear</option>
        <option value="Winterwear">Winterwear</option>
      </select>
    </div>

    <div>
      <p class='mb-2 font-medium'>Product Price</p>
      <input [(ngModel)]="price" name="price" class='w-full px-3 py-2 sm:w-[120px] border border-gray-300 rounded' type="number" placeholder='25' required/>
    </div>
  </div>

  <div>
    <p class='mb-2 font-medium'>Product Sizes</p>
    <div class='flex gap-3'>
      @for (size of ['S', 'M', 'L', 'XL', 'XXL']; track size) {
        <div (click)="toggleSize(size)" class="cursor-pointer">
          <p [class]="'px-3 py-1 border rounded ' + (sizes().includes(size) ? 'bg-pink-100 border-pink-300' : 'bg-slate-200 border-gray-300')">
            {{ size }}
          </p>
        </div>
      }
    </div>
  </div>

  <div class='flex gap-2 mt-2 items-center'>
    <input [(ngModel)]="bestseller" name="bestseller" type="checkbox" id='bestseller' class="w-4 h-4" />
    <label class='cursor-pointer' for="bestseller">Add to BestSeller</label>
  </div>

  <button class='w-28 py-3 mt-4 bg-black text-white rounded hover:bg-gray-800' type='submit'>ADD</button>
</form>
